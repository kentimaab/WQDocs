name: Build site

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install zensical pyyaml
      - run: python hooks/script_deps.py docs
      - run: zensical build --clean
      - run: git checkout docs/
