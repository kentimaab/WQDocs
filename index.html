<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WideQuick Docs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
    }

    .logo {
      width: 160px;
      margin-bottom: 2rem;
      opacity: 0.9;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: 0.01em;
    }

    p {
      font-size: 0.95rem;
      color: #9e9e9e;
      margin-bottom: 2.5rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      cursor: pointer;
    }

    a.btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    a.btn-en {
      background: #0072ce;
      color: #fff;
    }

    a.btn-sv {
      background: #006aa7;
      color: #ffcd00;
    }

    .flag {
      font-size: 1.2em;
      line-height: 1;
    }

    .hint {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>

  <img class="logo" src="site/assets/logo.svg" alt="WideQuick" onerror="this.style.display='none'">

  <h1>WideQuick Documentation</h1>
  <p>Select your language to continue</p>

  <div class="buttons">
    <a class="btn btn-en" href="site/index.html" onclick="localStorage.setItem('wqdocs-lang','en')">
      <span class="flag">🇬🇧</span> English
    </a>
    <a class="btn btn-sv" href="site/sv/index.html" onclick="localStorage.setItem('wqdocs-lang','sv')">
      <span class="flag">🇸🇪</span> Svenska
    </a>
  </div>

  <p class="hint">For full language switching within the site, use a local server:<br>
    <code>python -m http.server 8000 --directory site</code> → localhost:8000
  </p>

  <script>
    var lang = localStorage.getItem('wqdocs-lang');
    if (lang === 'en') window.location.replace('site/index.html');
    else if (lang === 'sv') window.location.replace('site/sv/index.html');
  </script>

</body>
</html>
