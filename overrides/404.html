{% extends "main.html" %}

{% block content %}
<style>
  .not-found {
    max-width: 560px;
    margin: 5rem auto;
    font-family: "Roboto", system-ui, sans-serif;
  }

  .not-found__code {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #f9991b;
    margin: 0 0 1rem;
  }

  .not-found__title {
    font-size: 2rem;
    font-weight: 700;
    color: #111;
    letter-spacing: -0.02em;
    margin: 0 0 0.75rem;
    line-height: 1.15;
  }

  .not-found__desc {
    font-size: 0.92rem;
    color: #666;
    line-height: 1.7;
    margin: 0 0 2.5rem;
  }

  .not-found__search-wrap {
    position: relative;
    margin-bottom: 2.5rem;
  }

  .not-found__search {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.75rem;
    font-size: 0.9rem;
    font-family: "Roboto", system-ui, sans-serif;
    color: #111;
    background: #f5f5f5;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    outline: none;
    cursor: text;
    box-sizing: border-box;
    transition: border-color 0.15s, background 0.15s;
  }

  .not-found__search:focus,
  .not-found__search:hover {
    border-color: #f9991b;
    background: #fff;
  }

  .not-found__search-icon {
    position: absolute;
    left: 0.85rem;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
    pointer-events: none;
  }

  .not-found__search-icon svg {
    display: block;
    width: 1rem;
    height: 1rem;
    box-shadow: none !important;
    margin: 0 !important;
  }

  .not-found__back {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.8rem;
    font-weight: 600;
    color: #111 !important;
    text-decoration: none !important;
    background: #1a1a1a;
    border-radius: 6px;
    overflow: hidden;
    transition: background 0.15s;
  }

  .not-found__back:hover { background: #333; }

  .not-found__back-icon {
    background: rgba(255,255,255,0.1);
    color: #fff;
    padding: 0.5em 0.65em;
    display: flex;
    align-items: center;
    line-height: 1;
  }

  .not-found__back-text {
    color: #fff;
    padding: 0.5em 1em;
  }

  /* ── Search modal ── */
  .nf-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    align-items: flex-start;
    justify-content: center;
    padding-top: 8vh;
  }

  .nf-modal-overlay.is-open {
    display: flex;
  }

  .nf-modal {
    background: #fff;
    border-radius: 12px;
    width: 100%;
    max-width: 580px;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    overflow: hidden;
    margin: 0 1rem;
  }

  .nf-modal__input-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid #ebebeb;
  }

  .nf-modal__input-row svg {
    flex-shrink: 0;
    color: #aaa;
    width: 1.1rem;
    height: 1.1rem;
    box-shadow: none !important;
    margin: 0 !important;
  }

  .nf-modal__input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 1rem;
    font-family: "Roboto", system-ui, sans-serif;
    color: #111;
    background: transparent;
    caret-color: #111 !important;
  }

  .nf-modal__input::placeholder { color: #bbb; }

  .nf-modal__close {
    background: #f2f2f2;
    border: none;
    border-radius: 5px;
    padding: 0.25em 0.55em;
    font-size: 0.72rem;
    color: #666;
    cursor: pointer;
    font-family: "JetBrains Mono", monospace;
    flex-shrink: 0;
  }

  .nf-modal__results {
    overflow-y: auto;
    padding: 0.5rem 0;
  }

  .nf-modal__empty {
    padding: 2rem 1.5rem;
    font-size: 0.85rem;
    color: #aaa;
    text-align: center;
  }

  .nf-modal__result {
    display: block;
    padding: 0.75rem 1.25rem;
    text-decoration: none !important;
    color: inherit !important;
    transition: background 0.1s;
    border-left: 3px solid transparent;
  }

  .nf-modal__result:hover,
  .nf-modal__result--selected {
    background: #fafafa;
    border-left-color: #f9991b;
  }

  .nf-modal__results.is-keyboard-nav .nf-modal__result:hover:not(.nf-modal__result--selected) {
    background: transparent;
    border-left-color: transparent;
  }

  .nf-modal__result-title {
    font-size: 0.88rem;
    font-weight: 600;
    color: #111;
    margin: 0 0 0.2rem;
  }

  .nf-modal__result-location {
    font-size: 0.72rem;
    color: #aaa;
    font-family: "JetBrains Mono", monospace;
  }

  .nf-modal__result-excerpt {
    font-size: 0.78rem;
    color: #777;
    margin: 0.2rem 0 0;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  mark {
    background: rgba(249,153,27,0.25);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }
</style>

<div class="not-found">
  <div class="not-found__code">404 — Page not found</div>
  <div class="not-found__title">This page doesn't exist.</div>
  <p class="not-found__desc">The URL may have changed, the page may have moved, or you may have followed an outdated link. Try searching for what you need.</p>

  <div class="not-found__search-wrap">
    <span class="not-found__search-icon">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8.5" cy="8.5" r="5"/><path d="M13 13l3.5 3.5"/>
      </svg>
    </span>
    <input id="not-found-search" class="not-found__search" type="text" placeholder="Search the documentation..." autocomplete="off">
  </div>

  <a href="/docs/" class="not-found__back">
    <span class="not-found__back-icon">←</span>
    <span class="not-found__back-text">Back to documentation</span>
  </a>
</div>

<!-- Search modal -->
<div class="nf-modal-overlay" id="nf-overlay">
  <div class="nf-modal">
    <div class="nf-modal__input-row">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8.5" cy="8.5" r="5"/><path d="M13 13l3.5 3.5"/>
      </svg>
      <input id="nf-modal-input" class="nf-modal__input" type="text" placeholder="Search documentation..." autocomplete="off">
      <button class="nf-modal__close" id="nf-close">ESC</button>
    </div>
    <div class="nf-modal__results" id="nf-results">
      <div class="nf-modal__empty">Start typing to search…</div>
    </div>
  </div>
</div>

<script>
  var searchIndex = null;
  var overlay = document.getElementById('nf-overlay');
  var modalInput = document.getElementById('nf-modal-input');
  var results = document.getElementById('nf-results');

  // Load search index — try production path first, fall back to local serve path
  fetch('/docs/search/search_index.json')
    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .catch(function() { return fetch('/search/search_index.json').then(function(r) { return r.json(); }); })
    .then(function(data) { searchIndex = data.docs; })
    .catch(function() { console.warn('Search index not found.'); });

  // Open modal
  document.getElementById('not-found-search').addEventListener('click', openModal);
  document.getElementById('not-found-search').addEventListener('focus', openModal);

  function openModal() {
    overlay.classList.add('is-open');
    setTimeout(function() {
      modalInput.focus();
      // Move caret to end of any existing value
      var len = modalInput.value.length;
      modalInput.setSelectionRange(len, len);
    }, 50);
  }

  // Close modal
  document.getElementById('nf-close').addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  function closeModal() {
    overlay.classList.remove('is-open');
    modalInput.value = '';
    results.innerHTML = '<div class="nf-modal__empty">Start typing to search…</div>';
  }

  // Search
  modalInput.addEventListener('input', function() {
    var q = this.value.trim().toLowerCase();
    if (!q || !searchIndex) {
      results.innerHTML = '<div class="nf-modal__empty">Start typing to search…</div>';
      return;
    }
    var matches = searchIndex.filter(function(doc) {
      return (doc.title && doc.title.toLowerCase().includes(q)) ||
             (doc.text && stripHtml(doc.text).toLowerCase().includes(q));
    }).slice(0, 8);

    if (!matches.length) {
      results.innerHTML = '<div class="nf-modal__empty">No results for "' + escHtml(q) + '"</div>';
      return;
    }

    results.innerHTML = matches.map(function(doc) {
      var excerpt = doc.text ? stripHtml(doc.text).slice(0, 120) : '';
      return '<a href="' + escHtml(doc.location) + '" class="nf-modal__result" role="option">' +
        '<div class="nf-modal__result-title">' + highlight(escHtml(doc.title || doc.location), q) + '</div>' +
        '<div class="nf-modal__result-location">' + escHtml(doc.location) + '</div>' +
        (excerpt ? '<div class="nf-modal__result-excerpt">' + highlight(escHtml(excerpt), q) + '</div>' : '') +
        '</a>';
    }).join('');
  });

  function stripHtml(s) {
    return String(s).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function highlight(text, q) {
    return text.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<mark>$1</mark>');
  }

  // Keyboard navigation
  var selectedIndex = -1;

  function getResultItems() {
    return Array.from(results.querySelectorAll('.nf-modal__result'));
  }

  function setSelected(index) {
    var items = getResultItems();
    items.forEach(function(item) {
      item.removeAttribute('aria-selected');
      item.classList.remove('nf-modal__result--selected');
    });
    selectedIndex = Math.max(-1, Math.min(index, items.length - 1));
    if (selectedIndex >= 0) {
      var el = items[selectedIndex];
      el.setAttribute('aria-selected', 'true');
      el.classList.add('nf-modal__result--selected');
      el.scrollIntoView({ block: 'nearest' });
    } else {
      modalInput.focus({ preventScroll: true });
    }
  }

  modalInput.addEventListener('keydown', function(e) {
    var items = getResultItems();
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      results.classList.add('is-keyboard-nav');
      setSelected(selectedIndex + 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      results.classList.add('is-keyboard-nav');
      setSelected(selectedIndex - 1);
    } else if (e.key === 'Enter' && selectedIndex >= 0 && items[selectedIndex]) {
      e.preventDefault();
      window.location.href = items[selectedIndex].href;
    }
  });

  results.addEventListener('mousemove', function() {
    results.classList.remove('is-keyboard-nav');
  });

  // Reset selection when results change
  var origInput = modalInput.oninput;
  modalInput.addEventListener('input', function() { selectedIndex = -1; });
</script>
{% endblock %}
