{% extends "base.html" %}

{% block extrahead %}
{{ super() }}
<script>
(function () {
  var COLLAPSED = ['Guides', 'Reference'];

  function processItem(item) {
    var ellipsis = item.querySelector('.md-nav__link .md-ellipsis');
    if (!ellipsis || COLLAPSED.indexOf(ellipsis.textContent.trim()) === -1) return;
    item.classList.remove('md-nav__item--section');
    if (!item.classList.contains('md-nav__item--nested')) {
      item.classList.add('md-nav__item--nested');
    }
    item.classList.add('nav-item--collapsible-section');
    if (item.querySelector('.md-nav__link--active')) return;
    var toggle = item.querySelector('input.md-nav__toggle');
    if (toggle) toggle.checked = false;
  }

  var observer = new MutationObserver(function (mutations) {
    for (var i = 0; i < mutations.length; i++) {
      var added = mutations[i].addedNodes;
      for (var j = 0; j < added.length; j++) {
        var node = added[j];
        if (node.nodeType !== 1) continue;
        if (node.classList.contains('md-nav__item--section')) processItem(node);
        var nested = node.querySelectorAll('.md-nav__item--section');
        for (var k = 0; k < nested.length; k++) processItem(nested[k]);
      }
    }
  });

  observer.observe(document.documentElement, { childList: true, subtree: true });

  document.addEventListener('DOMContentLoaded', function () {
    observer.disconnect();
  });
}());
</script>
{% endblock %}
